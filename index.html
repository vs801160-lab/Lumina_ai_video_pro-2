<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina AI Video Pro | Cinematic Veo Rendering</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <!-- Razorpay Checkout SDK -->
    <script async src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>
<body class="bg-slate-950">
    <div id="loading-screen" style="position: fixed; inset: 0; z-index: 9999; padding: 40px; text-align: center; font-family: sans-serif; background: #06080f; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center;">
        <h2 style="font-size: 32px; margin-bottom: 10px;">Lumina AI Video Pro</h2>
        <p id="loading-status" style="color: #6366f1; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; font-size: 12px;">Initializing Cinematic Engine...</p>
        <div id="spinner" style="margin-top: 20px; width: 40px; height: 40px; border: 3px solid rgba(99, 102, 241, 0.1); border-top-color: #6366f1; border-radius: 50%; animation: spin 1s linear infinite;"></div>
        <style>
            @keyframes spin { to { transform: rotate(360deg); } }
        </style>
        
        <div id="debug-monitor" style="margin-top: 30px; width: 100%; max-width: 600px; background: #000; border: 1px solid #1e293b; border-radius: 12px; padding: 15px; text-align: left; font-family: monospace; font-size: 10px; color: #94a3b8; max-height: 200px; overflow-y: auto;">
            <div style="display: flex; justify-content: space-between; color: #6366f1; border-bottom: 1px solid #1e293b; padding-bottom: 5px; margin-bottom: 5px; font-weight: bold;">
                <span>SYSTEM LOGS:</span>
                <a href="/api/logs" target="_blank" style="color: #4f46e5; text-decoration: underline;">View Server Logs</a>
            </div>
            <div id="debug-info">Waiting for boot...</div>
        </div>

        <div style="margin-top: 20px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;">
            <button onclick="window.location.reload()" style="padding: 10px 20px; background: #1e293b; color: white; border: 1px solid #334155; border-radius: 8px; cursor: pointer; font-size: 11px; font-weight: bold; text-transform: uppercase;">Reload</button>
            <button onclick="checkHealth()" style="padding: 10px 20px; background: #059669; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 11px; font-weight: bold; text-transform: uppercase;">Check Server</button>
            <button onclick="document.getElementById('loading-screen').style.display='none'" style="padding: 10px 20px; background: #4f46e5; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 11px; font-weight: bold; text-transform: uppercase;">Force Enter</button>
        </div>
    </div>
    <div id="root"></div>
    <script>
        console.log("HTML scripts starting... v8", Date.now());
        
        // Console override for on-screen debugging
        (function() {
            var debug = document.getElementById('debug-info');
            var oldLog = console.log;
            console.log = function() {
                oldLog.apply(console, arguments);
                if (debug) {
                    var msg = Array.from(arguments).map(function(a) { 
                        try { return typeof a === 'object' ? JSON.stringify(a) : a; } catch(e) { return a; }
                    }).join(" ");
                    var line = document.createElement('div');
                    line.innerText = "LOG: " + msg;
                    debug.appendChild(line);
                    debug.scrollTop = debug.scrollHeight;
                }
            };
            var oldError = console.error;
            console.error = function() {
                oldError.apply(console, arguments);
                if (debug) {
                    var msg = Array.from(arguments).map(function(a) { 
                        try { return typeof a === 'object' ? JSON.stringify(a) : a; } catch(e) { return a; }
                    }).join(" ");
                    var line = document.createElement('div');
                    line.style.color = "#ef4444";
                    line.innerText = "ERR: " + msg;
                    debug.appendChild(line);
                    debug.scrollTop = debug.scrollHeight;
                }
            };
        })();

        window.onerror = function(msg, url, line, col, error) {
            console.error("Global Error: " + msg + " at " + line + ":" + col, error);
            return false;
        };
        window.onunhandledrejection = function(event) {
            console.error("Promise Rejection: " + (event.reason?.message || event.reason));
        };
        
        // Check if index.tsx is reachable
        fetch('/src/index.tsx').then(r => {
            console.log("index.tsx reachability check:", r.status === 200 ? "OK" : "FAILED (" + r.status + ")");
        }).catch(e => {
            console.error("index.tsx reachability check error:", e.message);
        });

        function checkHealth() {
            console.log("Checking server health...");
            fetch('/api/health')
                .then(r => r.json())
                .then(data => console.log("Server Health:", data))
                .catch(e => console.error("Server Health Check Failed:", e.message));
        }
    </script>
    <script type="module" src="/src/index.tsx"></script>
</body>
</html>
